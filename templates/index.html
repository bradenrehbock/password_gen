<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Website that generates password, allowing choice of length and the use of numbers.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>

        <form action="/" method="POST" class="generator-form">
            <label for="length">Password Length</label>
            <input type="number" id="length" name="length" min="1" max="100">

            <label class="checkbox-label">
                <input type="checkbox" name="use_num">
                Include Numbers
            </label>

            <p id="result">{{ password if password else "Your Password Will Appear Here" }}</p>

            <button type="submit" class="primary-btn">Generate Password</button>
        </form>

        <button id="copy-btn" class="secondary-btn" onclick="copyPassword()">Copy Password</button>
    </div>

    <script>
        function copyPassword() {
            const password = document.getElementById("result").innerText.trim();
            if (password) {
                navigator.clipboard.writeText(password);
                const btn = document.getElementById("copy-btn");
                btn.innerText = "Copied!";
                setTimeout(() => {
                    btn.innerText = "Copy Password";
                }, 2000);
            }
        }
    </script>
</body>
</html>
